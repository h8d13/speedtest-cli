name: Release

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'speedtest.py'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set version info
        run: |
          PKGVER=$(sed -nE "s/^__version__ = '([^']+)'.*/\1/p" speedtest.py)
          echo "VER=v${PKGVER}" >> "$GITHUB_ENV"
          echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Create release archive
        run: |
          STAGE="speedtest-cli-${VER#v}"
          mkdir "/tmp/$STAGE"
          cp -a "$GITHUB_WORKSPACE/." "/tmp/$STAGE"
          rm -rf "/tmp/$STAGE/.git" "/tmp/$STAGE/.github" "/tmp/$STAGE/tests" \
                 "/tmp/$STAGE/CONTRIBUTING.md" "/tmp/$STAGE/tox.ini" \
                 "/tmp/$STAGE/.gitignore" "/tmp/$STAGE/.travis.yml" "/tmp/$STAGE/MANIFEST.in"
          tar -czf "/tmp/speedtest-${VER}.tar.gz" -C /tmp "$STAGE"

      - name: Publish tagged release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.VER }}
          name: ${{ env.VER }}-${{ env.SHA }}
          make_latest: true
          files: /tmp/speedtest-${{ env.VER }}.tar.gz
