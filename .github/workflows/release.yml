name: Release

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'speedtest.py'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set version info
        run: |
          PKGVER=$(sed -nE "s/^__version__ = '([^']+)'.*/\1/p" speedtest.py)
          echo "VER=v${PKGVER}" >> "$GITHUB_ENV"
          echo "SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Create release archive
        run: tar --exclude='.git' -czf /tmp/speedtest-${{ env.VER }}.tar.gz -C "$GITHUB_WORKSPACE" .

      - name: Publish tagged release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.VER }}
          name: ${{ env.VER }}-${{ env.SHA }}
          make_latest: true
          files: /tmp/speedtest-${{ env.VER }}.tar.gz
